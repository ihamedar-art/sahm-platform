<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ناشر الأخبار — جلسة السوق</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'IBM Plex Sans Arabic',sans-serif; background:#F0F2F5; color:#0C1B33; min-height:100vh; padding:24px 16px; }
.container { max-width:780px; margin:0 auto; }
.header { background:#1B4FD8; color:#fff; border-radius:14px; padding:20px 24px; margin-bottom:24px; display:flex; align-items:center; gap:14px; }
.header-icon { font-size:28px; }
.header h1 { font-size:18px; font-weight:700; }
.header p { font-size:13px; opacity:.8; margin-top:2px; }
.card { background:#fff; border-radius:14px; border:1px solid #E3E8F0; padding:24px; margin-bottom:16px; }
.card-title { font-size:14px; font-weight:700; color:#0C1B33; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.form-group { margin-bottom:14px; }
label { font-size:12px; font-weight:600; color:#3D5070; margin-bottom:6px; display:block; }
input, textarea { width:100%; padding:10px 14px; border:1.5px solid #E3E8F0; border-radius:8px; font-family:inherit; font-size:13.5px; color:#0C1B33; outline:none; transition:border .15s; background:#fff; }
input:focus, textarea:focus { border-color:#1B4FD8; }
textarea { resize:vertical; line-height:1.7; }
.btn { padding:10px 20px; border-radius:8px; font-family:inherit; font-weight:700; font-size:13.5px; cursor:pointer; border:none; transition:all .15s; display:inline-flex; align-items:center; gap:8px; }
.btn-primary { background:#1B4FD8; color:#fff; }
.btn-primary:hover { background:#1540B8; }
.btn-primary:disabled { background:#8496B0; cursor:not-allowed; }
.btn-secondary { background:#F0F2F5; color:#3D5070; }
.btn-secondary:hover { background:#E3E8F0; }
.btn-danger { background:#C8202A; color:#fff; }
.btn-success { background:#0A7C50; color:#fff; }
.btns { display:flex; gap:10px; flex-wrap:wrap; }
.status { padding:10px 14px; border-radius:8px; font-size:13px; font-weight:600; margin-top:12px; display:none; }
.status.success { background:#E6F5EE; color:#0A7C50; display:block; }
.status.error { background:#FDEAEA; color:#C8202A; display:block; }
.status.loading { background:#EEF2F8; color:#1B4FD8; display:block; }
.preview-box { background:#F7F9FC; border:1.5px solid #E3E8F0; border-radius:10px; padding:16px; margin-top:12px; }
.preview-title { font-size:15px; font-weight:700; color:#0C1B33; margin-bottom:8px; }
.preview-body { font-size:13px; color:#3D5070; line-height:1.7; white-space:pre-wrap; }
.preview-meta { font-size:11px; color:#8496B0; margin-top:10px; display:flex; gap:12px; flex-wrap:wrap; }
.badge { background:#EEF2F8; color:#1B4FD8; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.badge.green { background:#E6F5EE; color:#0A7C50; }
.divider { height:1px; background:#E3E8F0; margin:16px 0; }
.url-row { display:flex; gap:8px; }
.url-row input { flex:1; }
#fetch-btn { white-space:nowrap; }
.step-badge { background:#1B4FD8; color:#fff; width:22px; height:22px; border-radius:50%; font-size:11px; display:inline-flex; align-items:center; justify-content:center; font-weight:700; }
.ai-badge { background:linear-gradient(135deg,#1B4FD8,#6B35B8); color:#fff; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">📰</div>
    <div>
      <h1>ناشر الأخبار التلقائي</h1>
      <p>أدخل رابط الخبر وسيتم تلخيصه ونشره في حساب أخبار السوق</p>
    </div>
  </div>

  <!-- Step 1: URL -->
  <div class="card">
    <div class="card-title">
      <span class="step-badge">1</span>
      أدخل رابط الخبر
    </div>
    <div class="form-group">
      <label>رابط الخبر (أرقام، مباشر، الاقتصادية...)</label>
      <div class="url-row">
        <input type="url" id="news-url" placeholder="https://www.argaam.com/ar/..." />
        <button class="btn btn-primary" id="fetch-btn" onclick="fetchAndSummarize()">
          ✨ تلخيص
        </button>
      </div>
    </div>
    <div id="fetch-status" class="status"></div>
  </div>

  <!-- Step 2: Preview & Edit -->
  <div class="card" id="edit-card" style="display:none">
    <div class="card-title">
      <span class="step-badge">2</span>
      راجع الخبر قبل النشر
      <span class="ai-badge">✨ AI</span>
    </div>

    <div class="form-group">
      <label>عنوان الخبر</label>
      <input type="text" id="news-title" placeholder="عنوان الخبر..." />
    </div>

    <div class="form-group">
      <label>ملخص الخبر</label>
      <textarea id="news-summary" rows="5" placeholder="ملخص الخبر..."></textarea>
    </div>

    <div class="form-group">
      <label>المصدر</label>
      <input type="text" id="news-source" placeholder="أرقام / مباشر / الاقتصادية..." />
    </div>

    <div class="form-group">
      <label>رمز السهم (اختياري)</label>
      <input type="text" id="news-symbol" placeholder="مثال: $2222 أو $1120" />
    </div>

    <div class="divider"></div>

    <!-- Preview -->
    <div class="card-title" style="font-size:12px;color:#8496B0;margin-bottom:8px">معاينة المنشور</div>
    <div class="preview-box" id="preview-box">
      <div class="preview-title" id="preview-title"></div>
      <div class="preview-body" id="preview-body"></div>
      <div class="preview-meta" id="preview-meta"></div>
    </div>

    <div style="margin-top:16px">
      <div class="btns">
        <button class="btn btn-success" onclick="publishNews()">📤 نشر الخبر</button>
        <button class="btn btn-secondary" onclick="resetForm()">↩ إعادة تعيين</button>
      </div>
      <div id="publish-status" class="status"></div>
    </div>
  </div>

  <!-- Step 3: نشرات سابقة -->
  <div class="card" id="history-card" style="display:none">
    <div class="card-title">
      <span class="step-badge">3</span>
      تم النشر بنجاح! ✅
    </div>
    <div id="success-info" class="preview-box"></div>
    <div class="btns" style="margin-top:14px">
      <button class="btn btn-primary" onclick="resetForm()">➕ نشر خبر آخر</button>
      <a href="/" class="btn btn-secondary">🏠 الرئيسية</a>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════
// تحديث المعاينة تلقائياً
// ══════════════════════════════════════
['news-title','news-summary','news-source','news-symbol'].forEach(id => {
  document.getElementById(id).addEventListener('input', updatePreview);
});

function updatePreview() {
  const title = document.getElementById('news-title').value;
  const summary = document.getElementById('news-summary').value;
  const source = document.getElementById('news-source').value || 'جلسة السوق';
  const symbol = document.getElementById('news-symbol').value;

  document.getElementById('preview-title').textContent = '📰 ' + title;
  document.getElementById('preview-body').textContent = summary + '\n\n📌 المصدر: ' + source;
  document.getElementById('preview-meta').innerHTML = 
    (symbol ? `<span class="badge">${symbol}</span>` : '') +
    `<span class="badge green">📰 خبر</span>` +
    `<span style="color:#B0BDD0">📰 أخبار السوق · الآن</span>`;
}

// ══════════════════════════════════════
// جلب وتلخيص الخبر عبر Claude API
// ══════════════════════════════════════
async function fetchAndSummarize() {
  const url = document.getElementById('news-url').value.trim();
  if (!url) { showStatus('fetch-status', 'أدخل رابط الخبر أولاً', 'error'); return; }

  const btn = document.getElementById('fetch-btn');
  btn.disabled = true;
  btn.textContent = '⏳ جاري التلخيص...';
  showStatus('fetch-status', 'جاري قراءة الخبر وتلخيصه بالذكاء الاصطناعي...', 'loading');

  try {
    // جلب محتوى الصفحة عبر proxy بسيط
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const pageRes = await fetch(proxyUrl);
    const pageData = await pageRes.json();
    const html = pageData.contents || '';

    // استخراج النص من HTML
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    const text = tmp.innerText || tmp.textContent || '';
    const cleanText = text.replace(/\s+/g,' ').trim().slice(0, 4000);

    // إرسال لـ Claude API للتلخيص
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `أنت محرر أخبار مالية سعودي محترف. لخّص هذا الخبر المالي بالعربية بشكل موضوعي ومختصر.

أرجع الرد بصيغة JSON فقط بدون أي نص إضافي:
{
  "title": "عنوان الخبر (أقل من 80 حرف)",
  "summary": "ملخص الخبر (100-200 كلمة، يشمل الأرقام والمعلومات الرئيسية)",
  "source": "اسم المصدر (أرقام / مباشر / الاقتصادية / بلومبرج...)",
  "symbol": "رمز السهم بالصيغة $XXXX أو فارغ لو ما يوجد"
}

نص الخبر:
${cleanText}`
        }]
      })
    });

    const data = await response.json();
    const text2 = data.content?.[0]?.text || '';
    const clean = text2.replace(/```json|```/g,'').trim();
    const result = JSON.parse(clean);

    // تعبئة الحقول
    document.getElementById('news-title').value = result.title || '';
    document.getElementById('news-summary').value = result.summary || '';
    document.getElementById('news-source').value = result.source || 'أرقام';
    document.getElementById('news-symbol').value = result.symbol || '';

    updatePreview();
    document.getElementById('edit-card').style.display = 'block';
    document.getElementById('edit-card').scrollIntoView({ behavior:'smooth' });
    showStatus('fetch-status', '✅ تم التلخيص بنجاح — راجع الخبر قبل النشر', 'success');

  } catch(e) {
    showStatus('fetch-status', 'حدث خطأ: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '✨ تلخيص';
}

// ══════════════════════════════════════
// نشر الخبر في الموقع
// ══════════════════════════════════════
async function publishNews() {
  const title = document.getElementById('news-title').value.trim();
  const summary = document.getElementById('news-summary').value.trim();
  const source = document.getElementById('news-source').value.trim() || 'أرقام';
  const symbol = document.getElementById('news-symbol').value.trim();

  if (!title || !summary) {
    showStatus('publish-status', 'العنوان والملخص مطلوبان', 'error');
    return;
  }

  showStatus('publish-status', 'جاري النشر...', 'loading');

  try {
    const res = await fetch('/api/admin/news', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ title, summary, source, stock_symbols: symbol })
    });

    const data = await res.json();

    if (data.success) {
      document.getElementById('history-card').style.display = 'block';
      document.getElementById('success-info').innerHTML = `
        <div class="preview-title">📰 ${title}</div>
        <div class="preview-body" style="margin-top:8px;font-size:12px;color:#3D5070">${summary.slice(0,150)}...</div>
        <div class="preview-meta" style="margin-top:10px">
          <span class="badge green">✅ تم النشر</span>
          ${symbol ? `<span class="badge">${symbol}</span>` : ''}
          <span style="color:#B0BDD0">📌 ${source}</span>
        </div>
      `;
      document.getElementById('history-card').scrollIntoView({ behavior:'smooth' });
      document.getElementById('edit-card').style.display = 'none';
      showStatus('publish-status', '', '');
    } else {
      showStatus('publish-status', data.error || 'حدث خطأ في النشر — تأكد أنك مسجّل دخول كأدمن', 'error');
    }
  } catch(e) {
    showStatus('publish-status', 'خطأ في الاتصال: ' + e.message, 'error');
  }
}

// ══════════════════════════════════════
// مساعدات
// ══════════════════════════════════════
function showStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + type;
}

function resetForm() {
  document.getElementById('news-url').value = '';
  document.getElementById('news-title').value = '';
  document.getElementById('news-summary').value = '';
  document.getElementById('news-source').value = '';
  document.getElementById('news-symbol').value = '';
  document.getElementById('edit-card').style.display = 'none';
  document.getElementById('history-card').style.display = 'none';
  showStatus('fetch-status', '', '');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// إذا في URL في الـ query string، حمّله تلقائياً
const params = new URLSearchParams(window.location.search);
if (params.get('url')) {
  document.getElementById('news-url').value = params.get('url');
  fetchAndSummarize();
}
</script>
</body>
</html>
