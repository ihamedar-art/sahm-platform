// ── LiveKit Connection ───────────────────────────────────────────
let myRole = 'listener'; // owner / mod / listener
let roomInfoInterval = null;

async function joinLiveKitRoom(roomId, tokenData) {
  try {
    livekitRoom = new LivekitClient.Room({ adaptiveStream: true, dynacast: true });

    livekitRoom.on(LivekitClient.RoomEvent.ParticipantConnected, (p) => {
      refreshRoomInfo(roomId);
      toast(`انضم ${p.name || p.identity}`, 'info');
    });

    livekitRoom.on(LivekitClient.RoomEvent.ParticipantDisconnected, (p) => {
      document.getElementById(`speaker-${p.identity}`)?.remove();
      refreshRoomInfo(roomId);
    });

    livekitRoom.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, p) => {
      if (track.kind === LivekitClient.Track.Kind.Audio) track.attach();
    });

    livekitRoom.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
      track.detach();
    });

    // استقبال أوامر الإدارة عبر Data Channel
    livekitRoom.on(LivekitClient.RoomEvent.DataReceived, (data) => {
      try {
        const msg = JSON.parse(new TextDecoder().decode(data));
        if (msg.type === 'kick' && msg.userId === currentUser.id) {
          toast('🚫 تم طردك من الروم', 'error');
          leaveRoom(roomId, true);
        }
        if (msg.type === 'mute' && msg.userId === currentUser.id) {
          forceMute();
          toast('🔇 تم كتمك من قبل الإدارة', 'info');
        }
        if (msg.type === 'grant_mic' && msg.userId === currentUser.id) {
          if (msg.grant) {
            showMicRequestPopup(roomId, msg.fromName);
          } else {
            stopSpeaking();
            toast('🔇 تم سحب مايكك', 'info');
          }
        }
        if (msg.type === 'refresh') {
          refreshRoomInfo(roomId);
        }
        if (msg.type === 'mic_accepted') {
          toast(`✅ ${msg.userName} قبل المايك وبدأ الكلام`, 'success');
          refreshRoomInfo(roomId);
        }
        if (msg.type === 'mic_rejected') {
          toast(`❌ ${msg.userName} رفض المايك`, 'info');
          refreshRoomInfo(roomId);
        }
      } catch(e) {}
    });

    await livekitRoom.connect(tokenData.livekitUrl, tokenData.token);

    if (tokenData.canSpeak) {
      await startSpeaking(roomId);
    }

    livekitRoom.remoteParticipants.forEach(p => {});
    toast('✅ انضممت للروم', 'success');
  } catch(e) {
    console.error('LiveKit error:', e);
    toast('⚠️ تعذّر الاتصال — تأكد من إذن المايك', 'error');
  }
}

async function startSpeaking(roomId) {
  try {
    if (!localAudioTrack) {
      localAudioTrack = await LivekitClient.createLocalAudioTrack({ echoCancellation: true, noiseSuppression: true });
    }
    if (localAudioTrack.isMuted) await localAudioTrack.unmute();
    if (!livekitRoom.localParticipant.audioTracks.size) {
      await livekitRoom.localParticipant.publishTrack(localAudioTrack);
    }
    isMuted = false;
    updateMicUI(false);
  } catch(e) {
    console.error('mic error', e);
    toast('⚠️ تعذّر فتح المايك', 'error');
  }
}

async function stopSpeaking() {
  if (localAudioTrack) {
    await livekitRoom.localParticipant.unpublishTrack(localAudioTrack);
    localAudioTrack.stop();
    localAudioTrack = null;
  }
  isMuted = true;
  updateMicUI(true);
}

function forceMute() {
  if (localAudioTrack && !localAudioTrack.isMuted) {
    localAudioTrack.mute();
    isMuted = true;
    updateMicUI(true);
  }
}

function updateMicUI(muted) {
  const btn = document.getElementById('mic-btn');
  const mic = document.getElementById(`mic-ic-${currentUser.id}`);
  const av = document.getElementById(`av-${currentUser.id}`);
  if (btn) { btn.className = `ctrl-btn ${muted ? 'mic-off' : 'mic-on'}`; btn.textContent = muted ? '🔇' : '🎙️'; }
  if (mic) { mic.className = `speaker-mic ${muted ? 'muted' : ''}`; mic.textContent = muted ? '🔇' : '🎙️'; }
  if (av) av.className = `avatar speaker-avatar ${muted ? 'muted' : 'speaking'}`;
}

async function toggleMic() {
  if (!localAudioTrack && !isMuted) return;
  if (isMuted) {
    // إعادة تشغيل المايك
    await startSpeaking(currentRoomId);
  } else {
    // كتم المايك مع إبقاء الـ track
    await localAudioTrack.mute();
    isMuted = true;
    updateMicUI(true);
  }
}

// ── رفع اليد ────────────────────────────────────────────────────
async function toggleHand(roomId) {
  isHandRaised = !isHandRaised;
  const btn = document.getElementById('hand-btn');
  if (btn) { btn.className = `ctrl-btn hand-btn${isHandRaised ? ' raised' : ''}`; btn.textContent = isHandRaised ? '✋' : '🤚'; }
  await fetch(`/api/rooms/${roomId}/hand`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ raise: isHandRaised })
  });
  if (isHandRaised) toast('✋ تم رفع يدك — انتظر الإذن', 'info');
  else toast('تم إنزال يدك', 'info');
  refreshRoomInfo(roomId);
}

// ── إدارة الروم ──────────────────────────────────────────────────
async function grantMic(roomId, userId, grant = true) {
  const r = await fetch(`/api/rooms/${roomId}/grant-mic/${userId}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ grant })
  });
  const d = await r.json();
  if (d.error) { toast(d.error, 'error'); return; }
  if (livekitRoom) {
    const msg = JSON.stringify({ 
      type: 'grant_mic', userId, grant, 
      fromName: currentUser.display_name 
    });
    await livekitRoom.localParticipant.publishData(new TextEncoder().encode(msg), { reliable: true });
  }
  if (grant) {
    toast('✅ تم إرسال طلب المايك — بانتظار القبول', 'info');
  } else {
    toast('🔇 تم سحب المايك', 'info');
  }
  refreshRoomInfo(roomId);
}

async function kickUser(roomId, userId, userName) {
  if (!confirm(`هل تريد طرد ${userName}؟`)) return;
  const r = await fetch(`/api/rooms/${roomId}/kick/${userId}`, { method: 'POST' });
  const d = await r.json();
  if (d.error) { toast(d.error, 'error'); return; }
  if (livekitRoom) {
    const msg = JSON.stringify({ type: 'kick', userId });
    await livekitRoom.localParticipant.publishData(new TextEncoder().encode(msg), { reliable: true });
  }
  toast(`تم طرد ${userName}`, 'success');
  setTimeout(() => refreshRoomInfo(roomId), 500);
}

async function muteUser(roomId, userId, userName) {
  const r = await fetch(`/api/rooms/${roomId}/mute/${userId}`, { method: 'POST' });
  const d = await r.json();
  if (d.error) { toast(d.error, 'error'); return; }
  if (livekitRoom) {
    const msg = JSON.stringify({ type: 'mute', userId });
    await livekitRoom.localParticipant.publishData(new TextEncoder().encode(msg), { reliable: true });
  }
  toast(`تم كتم ${userName}`, 'info');
}

async function chatBanUser(roomId, userId, userName, ban = true) {
  const r = await fetch(`/api/rooms/${roomId}/chat-ban/${userId}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ ban })
  });
  const d = await r.json();
  if (d.error) { toast(d.error, 'error'); return; }
  toast(ban ? `🚫 تم حظر ${userName} من الشات` : `✅ تم رفع حظر ${userName}`, 'info');
}

async function makeMod(roomId, userId, userName, mod = true) {
  const r = await fetch(`/api/rooms/${roomId}/mod/${userId}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ mod })
  });
  const d = await r.json();
  if (d.error) { toast(d.error, 'error'); return; }
  if (livekitRoom) {
    const msg = JSON.stringify({ type: 'refresh' });
    await livekitRoom.localParticipant.publishData(new TextEncoder().encode(msg), { reliable: true });
  }
  toast(mod ? `⭐ ${userName} أصبح مشرفاً` : `تم إزالة إشراف ${userName}`, 'info');
  refreshRoomInfo(roomId);
}

// ── تحديث معلومات الروم (المشاركون + طلبات اليد) ─────────────────
async function refreshRoomInfo(roomId) {
  try {
    const r = await fetch(`/api/rooms/${roomId}/info`);
    const d = await r.json();
    if (d.error) return;
    myRole = d.myRole;
    renderParticipants(d, roomId);
    renderHandRequests(d.hands, roomId);
  } catch(e) {}
}

function renderParticipants(data, roomId) {
  const speakersGrid = document.getElementById('speakers-grid');
  const participantsList = document.getElementById('participants-list');
  if (!speakersGrid || !participantsList) return;

  const room = data.room;
  const members = data.members || [];
  const canMod = myRole === 'owner' || myRole === 'mod';

  // تحديث عدد المشاركين
  const countEl = document.getElementById('participants-count');
  if (countEl) countEl.textContent = `(${members.length + 1})`;

  // بناء قائمة المشاركين على اليمين
  const allParticipants = [
    { user_id: room.host_id, display_name: room.host_name, role: 'owner', can_speak: 1, is_muted: 0 },
    ...members.filter(m => m.user_id !== room.host_id)
  ];

  participantsList.innerHTML = allParticipants.map(m => {
    const isMe = m.user_id === currentUser.id;
    const canSpeak = m.can_speak || m.role === 'owner' || m.role === 'mod';
    const roleIcon = m.role === 'owner' ? '👑' : m.role === 'mod' ? '🛡️' : '';
    const micIcon = canSpeak ? (m.is_muted ? '🔇' : '🎙️') : '🔇';
    const modActions = canMod && !isMe && m.role !== 'owner' ? `
      <div class="participant-row-actions">
        ${canSpeak
          ? `<button class="pact-btn" onclick="grantMic('${roomId}','${m.user_id}',false)" title="سحب المايك">🔇</button>`
          : `<button class="pact-btn" onclick="grantMic('${roomId}','${m.user_id}',true)" title="إعطاء المايك">🎙️</button>`}
        <button class="pact-btn" onclick="muteUser('${roomId}','${m.user_id}','${m.display_name}')" title="كتم">🤐</button>
        <button class="pact-btn" onclick="chatBanUser('${roomId}','${m.user_id}','${m.display_name}',${!m.chat_banned})" title="حظر الشات">💬</button>
        ${myRole === 'owner' ? `<button class="pact-btn" onclick="makeMod('${roomId}','${m.user_id}','${m.display_name}',${m.role!=='mod'})" title="${m.role==='mod'?'إزالة مشرف':'تعيين مشرف'}">⭐</button>` : ''}
        <button class="pact-btn danger" onclick="kickUser('${roomId}','${m.user_id}','${m.display_name}')" title="طرد">🚫</button>
      </div>` : '';
    return `
      <div class="participant-row" id="prow-${m.user_id}">
        <div class="av ${canSpeak && !m.is_muted ? 'speaking' : 'muted-av'}" id="av-${m.user_id}">
          ${m.avatar ? `<img src="${m.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : (m.display_name||'?')[0]}
        </div>
        <div class="participant-row-info">
          <div class="participant-row-name">${roleIcon} ${m.display_name}${isMe?' (أنا)':''}</div>
          <div class="participant-row-role">${m.role==='owner'?'المضيف':m.role==='mod'?'مشرف':'مستمع'}</div>
        </div>
        <div class="participant-row-mic">${micIcon}</div>
        ${modActions}
      </div>`;
  }).join('');

  // تحديث المتحدثين في المنطقة المركزية
  const speakers = allParticipants.filter(m => m.can_speak || m.role === 'owner' || m.role === 'mod');
  speakersGrid.innerHTML = speakers.map(m => {
    const canSpeak = m.can_speak || m.role === 'owner' || m.role === 'mod';
    const roleLabel = m.role === 'owner' ? '<div style="font-size:10px;color:var(--gold)">👑</div>' : m.role === 'mod' ? '<div style="font-size:10px;color:var(--primary)">🛡️</div>' : '';
    return `
      <div class="speaker-item" id="speaker-${m.user_id}">
        <div class="speaker-avatar-wrap">
          <div class="avatar speaker-avatar ${canSpeak && !m.is_muted ? '' : 'muted'}" id="av-spk-${m.user_id}">
            ${m.avatar ? `<img src="${m.avatar}">` : (m.display_name||'?')[0]}
          </div>
          <div class="speaker-mic ${canSpeak && !m.is_muted ? '' : 'muted'}" id="mic-ic-${m.user_id}">${canSpeak && !m.is_muted ? '🎙️' : '🔇'}</div>
        </div>
        <div class="speaker-name">${m.display_name}</div>
        ${roleLabel}
      </div>`;
  }).join('');
}

function renderHandRequests(hands, roomId) {
  const canMod = myRole === 'owner' || myRole === 'mod';
  const wrap = document.getElementById('hand-requests-wrap');
  if (!wrap) return;
  if (!canMod || !hands || !hands.length) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = `
    <div style="background:var(--gold-bg);border:1px solid var(--gold);border-radius:var(--radius2);padding:10px 14px;margin:12px 12px 0">
      <div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:8px">✋ طلبات الكلام (${hands.length})</div>
      ${hands.map(h => `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:13px;flex:1">${h.display_name}</span>
          <button class="btn btn-primary btn-sm" onclick="grantMic('${roomId}','${h.user_id}',true)">🎙️ منح</button>
          <button class="btn btn-ghost btn-sm" onclick="dismissHand('${roomId}','${h.user_id}')">✕</button>
        </div>`).join('')}
    </div>`;
}

async function dismissHand(roomId, userId) {
  await fetch(`/api/rooms/${roomId}/hand`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ raise: false, userId })
  });
  refreshRoomInfo(roomId);
}

// ── popup طلب المايك ─────────────────────────────────────────────
function showMicRequestPopup(roomId, fromName) {
  // احذف أي popup موجود
  document.getElementById('mic-request-popup')?.remove();

  const popup = document.createElement('div');
  popup.id = 'mic-request-popup';
  popup.style.cssText = `
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: var(--bg2); border: 2px solid var(--primary);
    border-radius: 16px; padding: 28px 32px; z-index: 9999;
    box-shadow: 0 8px 40px rgba(0,0,0,.25); text-align: center;
    min-width: 280px; animation: fadeIn .25s ease;
  `;
  popup.innerHTML = `
    <div style="font-size:40px;margin-bottom:12px">🎙️</div>
    <div style="font-size:17px;font-weight:700;margin-bottom:6px">طلب مايك</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:20px">
      منحك <strong>${fromName || 'الأدمن'}</strong> صلاحية التحدث
    </div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="acceptMic('${roomId}')" style="
        padding:10px 28px; border-radius:10px; border:none;
        background:var(--primary); color:#fff; font-family:inherit;
        font-size:15px; font-weight:700; cursor:pointer;
      ">✅ قبول</button>
      <button onclick="rejectMic('${roomId}')" style="
        padding:10px 28px; border-radius:10px; border:none;
        background:var(--red-bg); color:var(--red); border:1.5px solid var(--red);
        font-family:inherit; font-size:15px; font-weight:700; cursor:pointer;
      ">❌ رفض</button>
    </div>
  `;

  // خلفية شبه شفافة
  const overlay = document.createElement('div');
  overlay.id = 'mic-request-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9998;';
  document.body.appendChild(overlay);
  document.body.appendChild(popup);
}

async function acceptMic(roomId) {
  document.getElementById('mic-request-popup')?.remove();
  document.getElementById('mic-request-overlay')?.remove();
  await startSpeaking(roomId);
  toast('🎙️ تم فتح المايك!', 'success');

  // أبلغ الأدمن بالقبول
  if (livekitRoom) {
    const msg = JSON.stringify({ type: 'mic_accepted', userId: currentUser.id, userName: currentUser.display_name });
    await livekitRoom.localParticipant.publishData(new TextEncoder().encode(msg), { reliable: true });
  }
  refreshRoomInfo(roomId);
}

async function rejectMic(roomId) {
  document.getElementById('mic-request-popup')?.remove();
  document.getElementById('mic-request-overlay')?.remove();
  toast('تم رفض طلب المايك', 'info');

  // أبلغ الأدمن بالرفض + سحب الصلاحية من DB
  if (livekitRoom) {
    const msg = JSON.stringify({ type: 'mic_rejected', userId: currentUser.id, userName: currentUser.display_name });
    await livekitRoom.localParticipant.publishData(new TextEncoder().encode(msg), { reliable: true });
  }
  await fetch(`/api/rooms/${roomId}/grant-mic/${currentUser.id}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ grant: false })
  });
}

async function leaveRoom(roomId, kicked = false) {
  try {
    if (livekitRoom) { await livekitRoom.disconnect(); livekitRoom = null; }
    if (localAudioTrack) { localAudioTrack.stop(); localAudioTrack = null; }
    if (chatPollInterval) { clearInterval(chatPollInterval); chatPollInterval = null; }
    if (roomInfoInterval) { clearInterval(roomInfoInterval); roomInfoInterval = null; }
    if (!kicked) await fetch(`/api/rooms/${roomId}/leave`, { method: 'POST' });
  } catch(e) {}
  currentRoomId = null; isMuted = false; isHandRaised = false; myRole = 'listener';
  navigate('rooms');
}

async function endRoom(roomId) {
  if (!confirm('هل تريد إنهاء الروم للجميع؟')) return;
  await fetch(`/api/rooms/${roomId}`, { method: 'DELETE' });
  leaveRoom(roomId);
}

// ── شات الروم ────────────────────────────────────────────────────
async function loadRoomChat(roomId) {
  const r = await fetch(`/api/rooms/${roomId}/messages`);
  const d = await r.json();
  const el = document.getElementById('room-chat-msgs');
  if (!el) return;
  const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 20;
  el.innerHTML = (d.messages||[]).map(m => `
    <div class="chat-msg">
      <div class="avatar avatar-sm" style="flex-shrink:0">${m.avatar ? `<img src="${m.avatar}">` : (m.display_name||'?')[0]}</div>
      <div class="chat-msg-body">
        <div class="chat-msg-name">${m.display_name}${m.is_verified ? ' ✓' : ''}</div>
        <div class="chat-msg-text">${m.content}</div>
      </div>
    </div>`).join('');
  if (atBottom) el.scrollTop = el.scrollHeight;
}

async function sendRoomChat(roomId) {
  if (!currentUser) { showLoginModal(); return; }
  const inp = document.getElementById('room-chat-inp');
  const content = inp?.value.trim();
  if (!content) return;
  inp.value = '';
  const r = await fetch(`/api/rooms/${roomId}/messages`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ content })
  });
  const d = await r.json();
  if (d.error) { toast(d.error, 'error'); inp.value = content; return; }
  loadRoomChat(roomId);
}
</script>

    if(!demo.length) feed.innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">لا توجد منشورات بعد</div></div>`;
    else demo.forEach(p=>feed.insertAdjacentHTML('beforeend',createPostCard(p)));
  } else {
    posts.forEach(p=>feed.insertAdjacentHTML('beforeend',createPostCard(p)));
    if(feedPage===0 && posts.length>0) latestPostId = posts[0].id;
  }
  const lm=document.getElementById('load-more-container');
  lm.innerHTML=posts.length===20?`<button class="btn btn-ghost" style="width:100%;margin:16px 0" onclick="loadMore()">تحميل المزيد</button>`:'';
  isLoading=false;
}

async function loadPoll() {

    const d = await r.json();

      question:'ما توقعك لمؤشر تاسي اليوم؟',
      bullish_count:142, bearish_count:67, neutral_count:38,

function renderPoll(poll) {
  const el = document.getElementById('poll-widget-wrap');
  if (!el) return;
  const voted = !!poll.myVote;

  el.innerHTML = `
    <div class="poll-widget">
      <div class="poll-header">
        <span class="poll-badge">🔔 جلسة اليوم</span>
        <span style="opacity:.7;font-size:12px">${formatPollDate(poll.date)}</span>
      </div>
      <div class="poll-title">${poll.question}</div>
      ${!voted ? `
        <div class="poll-btns">
          <button class="poll-btn bull" onclick="votePoll('bullish')">📈 صاعد</button>
          <button class="poll-btn neut" onclick="votePoll('neutral')">↔️ محايد</button>
          <button class="poll-btn bear" onclick="votePoll('bearish')">📉 هابط</button>
        </div>
        <div style="font-size:12px;opacity:.6;text-align:center">
          ${poll.total > 0 ? `${poll.total} متداول صوّت حتى الآن — صوّتك يُعطيك نقطة سمعة!` : 'كن أول من يصوّت اليوم!'}
        </div>
      ` : `
        <div class="poll-bars">
          <div class="poll-bar-row">
            <span class="poll-bar-label">📈 صاعد</span>
            <div class="poll-bar-track"><div class="poll-bar-fill bull" style="width:${poll.bullPct}%"></div></div>
            <span class="poll-bar-pct">${poll.bullPct}%</span>
            ${poll.myVote==='bullish'?'<span style="font-size:11px;opacity:.8">✓ صوتك</span>':''}
          </div>
          <div class="poll-bar-row">
            <span class="poll-bar-label">↔️ محايد</span>
            <div class="poll-bar-track"><div class="poll-bar-fill neut" style="width:${poll.neutPct}%"></div></div>
            <span class="poll-bar-pct">${poll.neutPct}%</span>
            ${poll.myVote==='neutral'?'<span style="font-size:11px;opacity:.8">✓ صوتك</span>':''}
          </div>
          <div class="poll-bar-row">
            <span class="poll-bar-label">📉 هابط</span>
            <div class="poll-bar-track"><div class="poll-bar-fill bear" style="width:${poll.bearPct}%"></div></div>
            <span class="poll-bar-pct">${poll.bearPct}%</span>
            ${poll.myVote==='bearish'?'<span style="font-size:11px;opacity:.8">✓ صوتك</span>':''}
          </div>
        </div>
        <div class="poll-total">${poll.total} متداول صوّت اليوم</div>
      `}
    </div>`;

  // Load history
  loadPollHistory();
}

async function votePoll(choice) {
  if (!currentUser) { showLogin(); return; }
  try {
    const r = await fetch('/api/poll/vote', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({choice})
    });
    const d = await r.json();
    if (d.error) { toast(d.error, 'error'); return; }
    renderPoll(d.poll);
    toast('تم تسجيل صوتك! +1 نقطة سمعة 🎉', 'success');
  } catch(e) {
    toast('لم يتم التصويت، حاول مرة أخرى', 'error');
  }
}

async function loadPollHistory() {
  try {
    const r = await fetch('/api/poll/history');
    const d = await r.json();
    if (!d.polls || d.polls.length < 2) return;
    const el = document.getElementById('poll-widget-wrap');
    if (!el) return;
    const widget = el.querySelector('.poll-widget');
    if (!widget) return;

    const histHtml = `
      <div class="poll-history">
        <div class="poll-history-title">📅 الأيام السابقة</div>
        ${d.polls.slice(1, 5).map(p => `
          <div class="poll-hist-item">
            <span class="poll-hist-date">${formatPollDate(p.date)}</span>
            <div class="poll-hist-bar">
              <div class="poll-hist-seg bull" style="width:${p.bullPct}%;background:#34D399;opacity:.7"></div>
              <div class="poll-hist-seg neut" style="width:${p.neutPct}%;background:rgba(255,255,255,.4)"></div>
              <div class="poll-hist-seg bear" style="width:${p.bearPct}%;background:#F87171;opacity:.7"></div>
            </div>
            <span style="font-size:11px;opacity:.6;width:30px;text-align:left">${p.total}</span>
          </div>`).join('')}
      </div>`;
    widget.insertAdjacentHTML('beforeend', histHtml);
  } catch(e) {}
}

function formatPollDate(dateStr) {
  const d = new Date(dateStr);
  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const today = new Date().toISOString().split('T')[0];
  if (dateStr === today) return 'اليوم';
  const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0];
  if (dateStr === yesterday) return 'أمس';
  return days[d.getDay()];
}

${newsItem.summary}

async function loadSingleComments(postId) {
  const list = document.getElementById('single-comments-list');
  if (!list) return;

  try {
    const r = await fetch('/api/posts/' + postId + '/comments');
    const d = await r.json();
    const cmts = d.comments || [];

    if (!cmts.length) {
      list.innerHTML = `
        <div style="text-align:center;padding:30px;color:var(--text3)">
          <div style="font-size:32px;margin-bottom:8px">💬</div>
          <div style="font-size:14px">لا تعليقات بعد — كن أول من يناقش هذا الخبر!</div>
        </div>`;
      return;
    }

    list.innerHTML = cmts.map(c => `
      <div class="cmt" style="padding:12px 0;border-bottom:1px solid var(--border)">
        <div class="av av-sm" style="background:${avColor(c.user_id)};cursor:pointer;flex-shrink:0" onclick="nav('profile','${c.username}')">
          ${c.avatar?`<img src="${c.avatar}">`:(c.display_name||'?')[0]}
        </div>
        <div class="cmt-body">
          <div class="cmt-meta">
            <span class="cmt-name" onclick="nav('profile','${c.username}')">${c.display_name}</span>
            ${c.is_verified?'<span style="color:var(--primary);font-size:11px">✓</span>':''}
            <span class="lv-badge" style="font-size:10px">${c.level_name}</span>
            <span class="cmt-time">${c.time_ago}</span>
          </div>
          <div class="cmt-text" style="font-size:14px;color:var(--text);margin-top:3px">${c.content}</div>
        </div>
      </div>`).join('');
  } catch(e) {
    list.innerHTML = '<p style="color:var(--text3);font-size:13px;padding:10px 0">تعذّر تحميل التعليقات</p>';
  }
}

async function submitSingleCmt(postId) {
  if (!currentUser) { showLogin(); return; }
  const inp = document.getElementById('single-cmt-input');
  const content = inp.value.trim();
  if (!content) return;
  inp.value = '';

  const r = await fetch('/api/posts/' + postId + '/comments', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({content})
  });
  const d = await r.json();
  if (d.error) { toast(d.error, 'error'); return; }
  toast('تم إضافة تعليقك ✅', 'success');
  loadSingleComments(postId);
}
