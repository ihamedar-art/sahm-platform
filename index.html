<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جلسة السوق — مجتمع المتداولين السعوديين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Readex+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F5F7FA;
  --bg2:       #FFFFFF;
  --bg3:       #EDF0F7;
  --border:    #E0E7F0;
  --border2:   #CDD7E8;
  --text:      #0D1829;
  --text2:     #445069;
  --text3:     #8895B0;
  --primary:   #1D4ED8;
  --primary2:  #1E40AF;
  --green:     #059669;
  --green-bg:  rgba(5,150,105,.08);
  --red:       #DC2626;
  --red-bg:    rgba(220,38,38,.08);
  --gold:      #D97706;
  --gold-bg:   rgba(217,119,6,.08);
  --radius:    14px;
  --radius2:   10px;
  --shadow:    0 2px 12px rgba(13,24,41,.07), 0 1px 3px rgba(13,24,41,.05);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Layout ── */
#app { display: flex; flex-direction: column; min-height: 100vh; }

.navbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 0 var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex; align-items: center; gap: 16px;
}

.navbar-logo {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; text-decoration: none;
  font-size: 22px; font-weight: 700; color: var(--text); font-family: 'IBM Plex Sans Arabic', sans-serif;
  letter-spacing: -0.5px;
}
.navbar-logo .logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), #1D4ED8);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}

.navbar-search {
  flex: 1; max-width: 380px; position: relative;
}
.navbar-search input {
  width: 100%; padding: 8px 16px 8px 40px;
  background: var(--bg3); border: 1.5px solid var(--border);
  border-radius: 24px; color: var(--text); font-family: inherit;
  font-size: 14px; outline: none; transition: border-color .2s;
}
.navbar-search input:focus { border-color: var(--primary); }
.navbar-search .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text3); }
.search-results {
  position: absolute; top: calc(100% + 8px); right: 0; left: 0;
  background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius);
  box-shadow: var(--shadow); z-index: 200; overflow: hidden; display: none;
}
.search-results.show { display: block; }
.search-result-item {
  padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  transition: background .15s;
}
.search-result-item:hover { background: var(--bg3); }

.navbar-actions { display: flex; align-items: center; gap: 8px; margin-right: auto; }

.btn {
  padding: 8px 18px; border-radius: var(--radius2); border: none;
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(29,78,216,.25); }
.btn-primary:hover { background: var(--primary2); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(29,78,216,.3); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }

.icon-btn {
  width: 38px; height: 38px; border-radius: var(--radius2);
  background: var(--bg3); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2); transition: all .2s; position: relative;
}
.icon-btn:hover { background: var(--border); color: var(--text); }
.notif-badge {
  position: absolute; top: -4px; right: -4px;
  background: var(--red); color: #fff; font-size: 10px;
  min-width: 18px; height: 18px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; padding: 0 4px;
}

.main-layout {
  display: flex; max-width: 1200px; margin: 0 auto;
  width: 100%; padding: 24px 16px; gap: 24px; flex: 1;
}

/* ── Sidebar ── */
.sidebar {
  width: 240px; flex-shrink: 0; position: sticky;
  top: 80px; height: fit-content;
}

.sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-radius: var(--radius2);
  color: var(--text2); cursor: pointer; transition: all .2s;
  font-size: 15px; font-weight: 500; text-decoration: none;
}
.nav-item:hover, .nav-item.active {
  background: var(--bg3); color: var(--text);
}
.nav-item.active { color: var(--primary); }
.nav-icon { width: 20px; text-align: center; font-size: 18px; }

.sidebar-card {
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-top: 16px;
  box-shadow: var(--shadow);
}
.sidebar-card-title {
  font-size: 13px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px;
}

.stock-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 20px;
  background: var(--bg3); border: 1px solid var(--border);
  font-size: 12px; font-weight: 600; color: var(--primary);
  cursor: pointer; transition: all .15s; margin: 3px 2px;
}
.stock-chip:hover { background: var(--bg3); border-color: var(--primary); }

/* ── Feed ── */
.feed { flex: 1; min-width: 0; }

.feed-tabs {
  display: flex; gap: 4px; margin-bottom: 20px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px;
}
.feed-tab {
  flex: 1; padding: 8px 16px; border-radius: var(--radius2);
  border: none; background: transparent; color: var(--text2);
  font-family: inherit; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .2s; text-align: center;
}
.feed-tab.active { background: var(--bg3); color: var(--text); }

/* ── Compose ── */
.compose-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 20px;
}
.compose-textarea {
  width: 100%; background: transparent; border: none;
  color: var(--text); font-family: inherit; font-size: 15px;
  resize: none; outline: none; min-height: 80px;
  placeholder-color: var(--text3);
}
.compose-textarea::placeholder { color: var(--text3); }
.compose-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
  gap: 8px; flex-wrap: wrap;
}
.compose-actions { display: flex; gap: 8px; align-items: center; }
.compose-type-select {
  padding: 6px 12px; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius2); color: var(--text2); font-family: inherit;
  font-size: 13px; outline: none; cursor: pointer;
}
.compose-hint { font-size: 12px; color: var(--text3); margin-top: 6px; }

.analysis-fields {
  display: none; gap: 10px; margin-top: 12px;
  padding-top: 12px; border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.analysis-fields.show { display: flex; }
.analysis-input {
  flex: 1; min-width: 120px; padding: 8px 12px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius2); color: var(--text); font-family: inherit;
  font-size: 13px; outline: none;
}
.analysis-input::placeholder { color: var(--text3); }
.direction-btns { display: flex; gap: 6px; }
.dir-btn {
  padding: 7px 14px; border-radius: var(--radius2);
  border: 1px solid var(--border2); background: transparent;
  font-family: inherit; font-size: 13px; cursor: pointer; transition: all .2s;
  color: var(--text2);
}
.dir-btn.bullish.active { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.dir-btn.bearish.active { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.char-count { font-size: 12px; color: var(--text3); }
.char-count.warn { color: var(--gold); }
.char-count.error { color: var(--red); }

/* ── Post Card ── */
.post-card {
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  transition: all .2s; box-shadow: var(--shadow);
  animation: fadeIn .3s ease;
}
.post-card:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(29,78,216,.1); }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

.post-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #7C3AED);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; color: #fff; flex-shrink: 0;
  overflow: hidden; cursor: pointer;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.post-meta { flex: 1; }
.post-author {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.author-name {
  font-weight: 600; color: var(--text); cursor: pointer;
  font-size: 14px;
}
.author-name:hover { color: var(--primary); text-decoration: underline; }
.author-handle { color: var(--text3); font-size: 13px; }
.verified-badge { color: var(--primary); font-size: 14px; }
.level-badge {
  font-size: 11px; padding: 2px 7px; border-radius: 10px;
  background: var(--bg3); color: var(--text2); border: 1px solid var(--border2);
}
.post-time { color: var(--text3); font-size: 12px; margin-top: 2px; }
.post-menu { margin-right: auto; color: var(--text3); cursor: pointer; padding: 4px; }

.post-content { font-size: 15px; line-height: 1.7; color: var(--text); margin-bottom: 12px; word-break: break-word; }
.post-symbol {
  color: var(--primary); font-weight: 600; cursor: pointer;
}
.post-symbol:hover { text-decoration: underline; }

.post-image {
  width: 100%; border-radius: var(--radius2); margin-bottom: 12px;
  max-height: 480px; object-fit: cover; cursor: pointer;
}

.analysis-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600; margin-bottom: 10px;
}
.analysis-badge.bullish { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.analysis-badge.bearish { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }
.analysis-badge.neutral { background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold); }

.analysis-targets {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
}
.target-tag {
  font-size: 12px; padding: 4px 10px; border-radius: var(--radius2);
  background: var(--bg3); border: 1px solid var(--border2); color: var(--text2);
}
.target-tag span { font-weight: 600; }

.post-actions {
  display: flex; align-items: center; gap: 6px;
  padding-top: 10px; border-top: 1px solid var(--border);
}
.action-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 10px; border-radius: var(--radius2);
  border: none; background: transparent; color: var(--text3);
  font-family: inherit; font-size: 13px; cursor: pointer;
  transition: all .15s;
}
.action-btn:hover { background: var(--bg3); color: var(--text); }
.action-btn.upvote:hover, .action-btn.upvote.active { color: var(--green); background: var(--green-bg); }
.action-btn.downvote:hover, .action-btn.downvote.active { color: var(--red); background: var(--red-bg); }
.action-btn.comment-btn:hover { color: var(--primary); }

/* ── Comments ── */
.comments-section {
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
  display: none;
}
.comments-section.show { display: block; }
.comment-input-row {
  display: flex; gap: 10px; margin-bottom: 14px;
}
.comment-input {
  flex: 1; padding: 8px 14px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: var(--radius2);
  color: var(--text); font-family: inherit; font-size: 14px; outline: none;
}
.comment-item {
  display: flex; gap: 10px; margin-bottom: 12px;
}
.comment-body { flex: 1; }
.comment-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 3px; flex-wrap: wrap; }
.comment-author { font-weight: 600; font-size: 13px; cursor: pointer; }
.comment-author:hover { color: var(--primary); }
.comment-time { font-size: 12px; color: var(--text3); }
.comment-text { font-size: 14px; color: var(--text); }
.avatar-sm { width: 32px; height: 32px; font-size: 12px; }

/* تفاعل التعليقات */
.comment-actions {
  display: flex; align-items: center; gap: 4px; margin-top: 6px;
}
.comment-action-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 20px;
  border: none; background: transparent; color: var(--text3);
  font-family: inherit; font-size: 12px; cursor: pointer;
  transition: all .15s;
}
.comment-action-btn:hover { background: var(--bg3); color: var(--text); }
.comment-action-btn.liked { color: var(--green); background: var(--green-bg); }
.comment-action-btn.reply-btn:hover { color: var(--primary); background: rgba(29,78,216,.08); }

/* صندوق الرد */
.reply-box {
  display: none; margin-top: 8px; margin-right: 42px;
}
.reply-box.show { display: flex; gap: 8px; }
.reply-input {
  flex: 1; padding: 6px 12px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 20px;
  color: var(--text); font-family: inherit; font-size: 13px; outline: none;
}

/* الردود المتداخلة */
.replies-list {
  margin-top: 8px; margin-right: 42px;
  border-right: 2px solid var(--border); padding-right: 12px;
}

/* ── Right Panel ── */
.right-panel { width: 280px; flex-shrink: 0; }
.panel-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
}
.panel-title {
  font-size: 14px; font-weight: 700; color: var(--text);
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}

.leaderboard-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.leaderboard-item:last-child { border-bottom: none; }
.rank-num { font-size: 13px; font-weight: 700; color: var(--text3); width: 24px; text-align: center; }
.rank-num.gold { color: var(--gold); }
.leaderboard-info { flex: 1; }
.leaderboard-name { font-size: 13px; font-weight: 600; cursor: pointer; }
.leaderboard-name:hover { color: var(--primary); }
.leaderboard-rep { font-size: 12px; color: var(--text3); }
.rep-score { font-weight: 600; color: var(--primary); font-size: 13px; }

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── Profile ── */
.profile-header {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
}
.profile-cover {
  height: 120px; border-radius: var(--radius2);
  background: linear-gradient(135deg, #1B3A6E, #2563C4, #7C3AED);
  margin-bottom: -50px;
}
.profile-avatar-wrap { padding-top: 0; display: flex; align-items: flex-end; justify-content: space-between; }
.profile-avatar { width: 90px; height: 90px; font-size: 32px; border: 4px solid var(--bg2); }
.profile-name { font-size: 20px; font-weight: 700; margin-top: 12px; }
.profile-handle { color: var(--text3); font-size: 14px; }
.profile-bio { color: var(--text2); font-size: 14px; margin: 10px 0; line-height: 1.6; }
.profile-stats { display: flex; gap: 24px; margin-top: 14px; }
.stat-item { text-align: center; }
.stat-num { font-size: 18px; font-weight: 700; color: var(--text); }
.stat-label { font-size: 12px; color: var(--text3); }

/* ── Auth Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 16px; padding: 32px; width: 100%; max-width: 440px;
  box-shadow: var(--shadow); transform: translateY(16px); transition: transform .25s;
}
.modal-overlay.show .modal { transform: translateY(0); }
.modal-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.modal-subtitle { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 11px 14px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: var(--radius2);
  color: var(--text); font-family: inherit; font-size: 14px; outline: none;
  transition: border-color .2s;
}
.form-input:focus { border-color: var(--primary); }
.form-error { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; }
.form-switch { text-align: center; margin-top: 20px; color: var(--text2); font-size: 14px; }
.form-switch a { color: var(--primary); cursor: pointer; font-weight: 600; }
.modal-close {
  position: absolute; top: 16px; left: 16px;
  background: var(--bg3); border: none; border-radius: 50%;
  width: 32px; height: 32px; cursor: pointer; color: var(--text2);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.modal-close:hover { color: var(--text); }

/* ── Toast ── */
#toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast {
  padding: 12px 20px; border-radius: var(--radius2);
  font-size: 14px; font-weight: 500; box-shadow: var(--shadow);
  animation: toastIn .3s ease; white-space: nowrap; max-width: 90vw;
}
@keyframes toastIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
.toast-success { background: var(--green); color: #fff; }
.toast-error { background: var(--red); color: #fff; }
.toast-info { background: var(--primary); color: #fff; }

/* ── Notif Panel ── */
.notif-panel {
  position: fixed; top: 64px; left: 80px;
  width: 360px; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); box-shadow: var(--shadow); z-index: 500;
  max-height: 480px; overflow-y: auto; display: none;
}
.notif-panel.show { display: block; animation: fadeIn .2s ease; }
.notif-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.notif-item { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; cursor: pointer; }
.notif-item:hover { background: var(--bg3); }
.notif-item.unread { background: rgba(59,125,221,.05); }
.notif-text { font-size: 13px; color: var(--text); flex: 1; }
.notif-time { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ── Loading ── */
.skeleton {
  background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite;
  border-radius: var(--radius2);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Empty State ── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text3);
}
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .5; }
.empty-title { font-size: 18px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .right-panel { display: none; }
  .main-layout { padding: 16px 12px; }
}
@media (max-width: 640px) {
  .sidebar { display: none; }
  .navbar-search { max-width: 100%; }
  .post-card { padding: 14px; }
}

/* ── Stock Page ── */
.stock-header {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
}
.stock-symbol { font-size: 28px; font-weight: 700; color: var(--primary); }
.stock-name { font-size: 16px; color: var(--text2); margin-top: 4px; }
.stock-sentiment {
  display: flex; gap: 12px; margin-top: 16px;
}
.sentiment-bar { flex: 1; }
.sentiment-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; display: flex; justify-content: space-between; }
.sentiment-track { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.sentiment-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
.sentiment-fill.bullish { background: var(--green); }
.sentiment-fill.bearish { background: var(--red); }

/* ── Daily Poll Widget ── */
.poll-widget {
  background: linear-gradient(135deg, #1D4ED8 0%, #0891B2 100%);
  border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
  box-shadow: 0 4px 20px rgba(29,78,216,.25); color: #fff;
  position: relative; overflow: hidden;
}
.poll-widget::before {
  content: ''; position: absolute; top: -30px; left: -30px;
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,.06);
}
.poll-widget::after {
  content: ''; position: absolute; bottom: -20px; right: -20px;
  width: 90px; height: 90px; border-radius: 50%;
  background: rgba(255,255,255,.06);
}
.poll-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.poll-badge { background:rgba(255,255,255,.2); padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.poll-title { font-size:16px; font-weight:700; margin-bottom:14px; line-height:1.4; }
.poll-btns { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.poll-btn {
  flex:1; min-width:80px; padding:10px 8px; border-radius:var(--radius2);
  border: 2px solid rgba(255,255,255,.3); background: rgba(255,255,255,.1);
  color: #fff; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:700;
  cursor: pointer; transition: all .2s; text-align:center;
}
.poll-btn:hover { background: rgba(255,255,255,.2); border-color: rgba(255,255,255,.6); transform:translateY(-1px); }
.poll-btn.bull.selected { background: #059669; border-color: #34D399; }
.poll-btn.bear.selected { background: #DC2626; border-color: #F87171; }
.poll-btn.neut.selected { background: rgba(255,255,255,.25); border-color: #fff; }
.poll-bars { display:flex; flex-direction:column; gap:7px; }
.poll-bar-row { display:flex; align-items:center; gap:8px; }
.poll-bar-label { font-size:12px; font-weight:600; width:50px; opacity:.9; }
.poll-bar-track { flex:1; height:8px; background:rgba(255,255,255,.15); border-radius:4px; overflow:hidden; }
.poll-bar-fill { height:100%; border-radius:4px; transition:width .6s ease; }
.poll-bar-fill.bull { background: linear-gradient(90deg,#34D399,#6EE7B7); }
.poll-bar-fill.bear { background: linear-gradient(90deg,#F87171,#FCA5A5); }
.poll-bar-fill.neut { background: linear-gradient(90deg,rgba(255,255,255,.6),rgba(255,255,255,.4)); }
.poll-bar-pct { font-size:12px; font-weight:700; width:32px; text-align:left; }
.poll-total { font-size:12px; opacity:.7; margin-top:10px; text-align:center; }
.poll-history { margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,.15); }
.poll-history-title { font-size:12px; opacity:.7; margin-bottom:8px; font-weight:600; }
.poll-hist-item { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.poll-hist-date { font-size:11px; opacity:.6; width:55px; }
.poll-hist-bar { flex:1; height:5px; background:rgba(255,255,255,.1); border-radius:3px; overflow:hidden; display:flex; }
.poll-hist-seg { height:100%; transition:width .4s ease; }


/* ── New Posts Button (Twitter style) ── */
.new-posts-btn {
  display: none;
  position: sticky;
  top: 70px;
  z-index: 50;
  margin-bottom: 12px;
  text-align: center;
}
.new-posts-btn.show { display: block; }
.new-posts-btn button {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 24px;
  padding: 10px 24px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(29,78,216,.35);
  transition: all .2s;
  animation: fadeIn .3s ease;
}
.new-posts-btn button:hover { background: var(--primary2); transform: translateY(-1px); }

/* ── Single Post Page ── */
.single-post-page { max-width: 100%; }
.single-post-back {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text2); cursor: pointer; font-size: 14px;
  margin-bottom: 16px; padding: 6px 0;
}
.single-post-back:hover { color: var(--primary); }
.single-comments-wrap { margin-top: 20px; }
.single-comments-title {
  font-size: 16px; font-weight: 700; margin-bottom: 16px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.single-comment-input-wrap {
  display: flex; gap: 10px; margin-bottom: 20px;
}
.single-comment-item {
  display: flex; gap: 10px; padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.single-comment-item:last-child { border-bottom: none; }

.news-item {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .15s; display: block;
}
.news-item:last-child { border-bottom: none; }
.news-item:hover { background: var(--bg3); }
.news-source {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; color: var(--primary);
  background: var(--primary-l); padding: 2px 7px; border-radius: 8px;
  margin-bottom: 5px;
}
.news-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  line-height: 1.5; margin-bottom: 4px;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.news-meta {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text3);
}
.news-sym {
  color: var(--primary); font-weight: 700; font-size: 11px;
}

/* ── Voice Rooms ── */
.room-card {
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  cursor: pointer; transition: all .2s; box-shadow: var(--shadow);
}
.room-card:hover { border-color: var(--primary); box-shadow: 0 4px 20px rgba(29,78,216,.1); }
.room-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.room-name { font-size: 16px; font-weight: 700; color: var(--text); }
.room-topic { font-size: 12px; color: var(--text3); margin-top: 2px; }
.room-live-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--red-bg); color: var(--red); border: 1px solid var(--red);
  font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 10px;
}
.room-live-badge::before { content: ''; width: 6px; height: 6px; background: var(--red); border-radius: 50%; animation: pulse 1.5s infinite; display:inline-block; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.room-host { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.room-count { font-size: 12px; color: var(--text3); }

/* Room Page */
.room-page { display: flex; height: calc(100vh - 60px); overflow: hidden; }

/* الشات في الوسط - المساحة الكبيرة */
.room-chat {
  flex: 1; display: flex; flex-direction: column;
  background: var(--bg2); min-width: 0;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.room-chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 14px; display:flex; align-items:center; gap:6px; background: var(--bg2); }
.room-chat-messages { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { display: flex; gap: 10px; }
.chat-msg-body { flex:1; }
.chat-msg-name { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom:2px; }
.chat-msg-text { font-size: 14px; color: var(--text); word-break: break-word; line-height:1.5; }
.room-chat-input { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--bg2); }
.room-chat-input input { flex:1; padding: 10px 16px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 24px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; transition: border-color .2s; }
.room-chat-input input:focus { border-color: var(--primary); }

/* الهيدر العلوي */
.room-main { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.room-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display:flex; align-items:center; gap:10px; background: var(--bg2); flex-shrink:0; }
.room-header-title { font-size: 16px; font-weight: 700; flex:1; }

/* الجانب الأيمن - المتواجدون + الأزرار */
.room-participants-panel {
  width: 220px; flex-shrink: 0;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--bg2);
}
.room-participants-header {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  font-size: 13px; font-weight: 700; color: var(--text2);
  flex-shrink: 0; background: var(--bg2);
}
.room-participants-list { flex: 1; overflow-y: auto; }

/* الأزرار ثابتة تحت القائمة */
.room-controls {
  padding: 12px 10px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  gap: 10px; flex-wrap: wrap; background: var(--bg2);
  flex-shrink: 0;
}
.ctrl-btn {
  width: 46px; height: 46px; border-radius: 50%; border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; cursor: pointer; transition: all .2s;
}
.ctrl-btn.mic-on { background: var(--primary); color: #fff; }
.ctrl-btn.mic-off { background: var(--red-bg); color: var(--red); border: 2px solid var(--red); }
.ctrl-btn.hand-btn { background: var(--gold-bg); color: var(--gold); border: 2px solid var(--gold); }
.ctrl-btn.hand-btn.raised { background: var(--gold); color: #fff; animation: pulse 1.5s infinite; }
.ctrl-btn.leave-btn { background: var(--red); color: #fff; }
.ctrl-btn:hover { transform: scale(1.1); }
.ctrl-label { font-size: 10px; color: var(--text3); text-align: center; margin-top: 3px; }

/* صف المشارك */
.participant-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  transition: background .15s; position: relative;
}
.participant-row:hover { background: var(--bg3); }
.participant-row .av {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--primary), #7C3AED);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; overflow: hidden;
  border: 2px solid var(--border2);
}
.participant-row .av.speaking { border-color: var(--green); box-shadow: 0 0 0 2px rgba(5,150,105,.3); }
.participant-row-info { flex: 1; min-width: 0; }
.participant-row-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.participant-row-role { font-size: 10px; color: var(--text3); }
.participant-row-mic { font-size: 13px; flex-shrink: 0; }
.participant-row-actions { display: none; position: absolute; left: 0; right: 0; top: 100%; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius2); padding: 6px; z-index: 10; display: none; gap: 4px; flex-wrap: wrap; box-shadow: var(--shadow); }
.participant-row:hover .participant-row-actions { display: flex; }

/* المتحدثون في أعلى القائمة */
.speakers-stage { padding: 12px; border-bottom: 2px solid var(--border); background: var(--bg3); }
.stage-section-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.speakers-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
.speaker-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.speaker-avatar-wrap { position: relative; }
.speaker-avatar { width: 48px; height: 48px; font-size: 16px; border: 2px solid var(--primary); }
.speaker-avatar.muted { border-color: var(--border2); opacity:.7; }
.speaker-avatar.speaking { border-color: var(--green); box-shadow: 0 0 0 2px rgba(5,150,105,.3); }
.speaker-mic {
  position: absolute; bottom: -2px; right: -2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--primary); display: flex; align-items: center;
  justify-content: center; font-size: 8px; border: 2px solid var(--bg2);
}
.speaker-mic.muted { background: var(--text3); }
.speaker-name { font-size: 10px; font-weight: 600; color: var(--text); text-align: center; max-width: 54px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hand-raised { position: absolute; top: -6px; right: -6px; font-size: 14px; animation: bounce .6s infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-4px)} }

.participant-actions { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; justify-content: center; }
.pact-btn { padding: 3px 6px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); cursor: pointer; font-size: 11px; transition: all .15s; }
.pact-btn:hover { background: var(--border); }
.pact-btn.danger { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.pact-btn.danger:hover { background: var(--red); color: #fff; }
.chat-msg-body { flex: 1; }
.chat-msg-name { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
.chat-msg-text { font-size: 13px; color: var(--text); word-break: break-word; line-height: 1.5; }
.room-chat-input { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.room-chat-input input {
  flex: 1; padding: 8px 12px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 20px;
  color: var(--text); font-family: inherit; font-size: 13px; outline: none;
}

</style>
</head>
<body>
<div id="app">

<!-- Navbar -->
<nav class="navbar">
  <a class="navbar-logo" onclick="navigate('home')">
    <div class="logo-icon">🔔</div>
    جلسة السوق
  </a>
  <div class="navbar-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="ابحث عن مستخدم أو سهم..." autocomplete="off">
    <div class="search-results" id="search-results"></div>
  </div>
  <div class="navbar-actions">
    <div id="auth-actions"></div>
  </div>
</nav>

<!-- Main Layout -->
<div class="main-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <a class="nav-item active" id="nav-home" onclick="navigate('home')">
        <span class="nav-icon">🏠</span> الرئيسية
      </a>
      <a class="nav-item" id="nav-explore" onclick="navigate('explore')">
        <span class="nav-icon">🔥</span> استكشاف
      </a>

      <a class="nav-item" id="nav-ipos" onclick="navigate('ipos')">
        <span class="nav-icon">🆕</span> الاكتتابات
      </a>
      <a class="nav-item" id="nav-rooms" onclick="navigate('rooms')">
        <span class="nav-icon">🎙️</span> الرومات الصوتية
      </a>
      <a class="nav-item" id="nav-profile" onclick="navigate('profile')">
        <span class="nav-icon">👤</span> حسابي
      </a>
    </nav>

    <div class="sidebar-card" style="padding:0;overflow:hidden">
      <div style="padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div class="sidebar-card-title" style="margin:0">📰 أحدث الأخبار</div>
        <span style="font-size:11px;color:var(--text3)">يتجدد تلقائياً</span>
      </div>
      <div id="news-sidebar"></div>
    </div>
  </aside>

  <!-- Feed -->
  <main class="feed">
    <!-- Home Page -->
    <div class="page active" id="page-home">
      <div id="compose-area"></div>
      <div id="poll-widget-wrap"></div>
      <div class="new-posts-btn" id="new-posts-btn">
        <button onclick="loadNewPosts()">⬆️ منشورات جديدة — اضغط للتحديث</button>
      </div>
      <div class="feed-tabs">
        <button class="feed-tab active" onclick="switchTab('discover')">🔥 الاكتشاف</button>
        <button class="feed-tab" onclick="switchTab('following')">👥 المتابَعون</button>
        <button class="feed-tab" onclick="switchTab('analysis')">📊 تحاليل</button>
      </div>
      <div id="posts-feed"></div>
      <div id="load-more-container"></div>
    </div>

    <!-- Explore Page -->
    <div class="page" id="page-explore">
      <h2 style="margin-bottom:20px">🔥 استكشاف الأسهم</h2>
      <div id="explore-stocks-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:24px"></div>
      <h3 style="margin-bottom:16px">المنشورات الأكثر تفاعلاً</h3>
      <div id="explore-feed"></div>
    </div>



    <!-- IPOs Page -->
    <div class="page" id="page-ipos">
      <div class="panel-card">
        <div class="panel-title">🆕 الاكتتابات القادمة</div>
        <div id="ipos-content"></div>
      </div>
    </div>

    <!-- Rooms Page -->
    <div class="page" id="page-rooms">
      <div id="rooms-content"></div>
    </div>

    <!-- Single Room Page -->
    <div class="page" id="page-room">
      <div id="room-content"></div>
    </div>

    <!-- Profile Page -->
    <div class="page" id="page-profile">
      <div id="profile-content"></div>
    </div>

    <!-- Stock Page -->
    <div class="page" id="page-stock">
      <div id="stock-content"></div>
    </div>

    <!-- Single Post Page -->
    <div class="page" id="page-post">
      <div id="post-page-content"></div>
    </div>
  </main>

  <!-- Right Panel -->
  <aside class="right-panel">

    <div class="panel-card">
      <div class="panel-title">📊 أكثر الأسهم نقاشاً</div>
      <div id="trending-stocks"></div>
    </div>
  </aside>
</div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal('auth-modal')">✕</button>
    <div id="auth-modal-content"></div>
  </div>
</div>

<!-- Notifications Panel -->
<div class="notif-panel" id="notif-panel">
  <div class="notif-header">
    <span style="font-weight:700">الإشعارات</span>
    <button class="btn btn-ghost btn-sm" onclick="markNotifRead()">تعليم كمقروء</button>
  </div>
  <div id="notif-list"></div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script>
// ══════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════
let currentUser = null;
let currentTab = 'discover';
let currentPage = 'home';
let feedPage = 0;
let isLoading = false;
let selectedDirection = '';
let notifCount = 0;

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
async function init() {
  await checkAuth();
  loadPopularStocks();
  loadLeaderboardPanel();
  loadTrendingStocks();
  renderFeed();
  loadPoll();
  if (currentUser) pollNotifications();
  setTimeout(checkNewPosts, 15000);
}

async function checkAuth() {
  const res = await fetch('/api/me');
  const data = await res.json();
  currentUser = data.user;
  renderAuthArea();
  renderComposeArea();
}

// ══════════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════════
function navigate(page, param = '') {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  currentPage = page;
  const nav = document.getElementById('nav-' + page);
  if (nav) nav.classList.add('active');

  if (page === 'home') {
    document.getElementById('page-home').classList.add('active');
    renderFeed();
  } else if (page === 'explore') {
    document.getElementById('page-explore').classList.add('active');
    loadExplorePage();
  } else if (page === 'leaderboard') {
    document.getElementById('page-leaderboard').classList.add('active');
    loadFullLeaderboard();
  } else if (page === 'rooms') {
    document.getElementById('page-rooms').classList.add('active');
    // إعادة إظهار السايدبار
    document.querySelector('.sidebar')?.style.setProperty('display','');
    document.querySelector('.right-panel')?.style.setProperty('display','');
    loadRoomsPage();
  } else if (page === 'room') {
    document.getElementById('page-room').classList.add('active');
    // إخفاء السايدبار والبانل اليمين داخل الروم
    document.querySelector('.sidebar')?.style.setProperty('display','none');
    document.querySelector('.right-panel')?.style.setProperty('display','none');
    document.querySelector('.feed')?.style.setProperty('max-width','100%');
    loadRoomPage(param);
  } else if (page === 'ipos') {
    document.getElementById('page-ipos').classList.add('active');
    loadIPOs();
  } else if (page === 'profile') {
    document.getElementById('page-profile').classList.add('active');
    const username = param || (currentUser ? currentUser.username : '');
    if (username) loadProfile(username);
    else showLoginModal();
  } else if (page === 'post') {
    document.getElementById('page-post').classList.add('active');
    loadPostPage(param);
  } else if (page === 'stock') {
    document.getElementById('page-stock').classList.add('active');
    loadStockPage(param);
  }
}

// ══════════════════════════════════════════════════════════════════

async function submitPost() {
  if (!currentUser) { showLoginModal(); return; }
  const content = document.getElementById('compose-text').value.trim();
  if (!content) { toast('اكتب شيئاً أولاً', 'error'); return; }

  const formData = new FormData();
  formData.append('content', content);
  formData.append('post_type', document.getElementById('post-type').value);
  formData.append('direction', selectedDirection);
  const img = document.getElementById('post-image');
  if (img && img.files[0]) formData.append('image', img.files[0]);
  if (document.getElementById('target-price')) formData.append('target_price', document.getElementById('target-price').value || 0);
  if (document.getElementById('stop-loss')) formData.append('stop_loss', document.getElementById('stop-loss').value || 0);
  if (document.getElementById('timeframe-select')) formData.append('timeframe', document.getElementById('timeframe-select').value);

  const btn = event.target;
  btn.disabled = true; btn.textContent = 'جاري النشر...';

  const res = await fetch('/api/posts', { method:'POST', body:formData });
  const data = await res.json();
  btn.disabled = false; btn.textContent = 'نشر ✨';

  if (data.error) { toast(data.error, 'error'); return; }

  document.getElementById('compose-text').value = '';
  clearImage();
  document.getElementById('char-count').textContent = '0 / 2000';
  selectedDirection = '';
  document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));

  const feed = document.getElementById('posts-feed');
  const card = createPostCard(data.post);
  feed.insertAdjacentHTML('afterbegin', card);
  toast('تم النشر بنجاح! 🎉', 'success');
}

async function renderFeed(reset = true) {
  if (reset) { feedPage = 0; document.getElementById('posts-feed').innerHTML = ''; }
  if (isLoading) return;
  isLoading = true;

  let url = `/api/posts?page=${feedPage}`;
  if (currentTab === 'following') url += '&feed=following';
  else if (currentTab === 'analysis') url += '&feed=discover';

  const res = await fetch(url);
  const data = await res.json();
  const feed = document.getElementById('posts-feed');

  let posts = data.posts;
  if (currentTab === 'analysis') posts = posts.filter(p => p.post_type === 'analysis');

  if (posts.length === 0 && feedPage === 0) {
    feed.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div>
      <div class="empty-title">لا توجد منشورات بعد</div>
      <p>${currentTab === 'following' ? 'تابع بعض المحللين لترى منشوراتهم هنا' : 'افتح الجلسة وكن أول من ينشر!'}</p></div>`;
  } else {
    posts.forEach(p => feed.insertAdjacentHTML('beforeend', createPostCard(p)));
  }

  const lm = document.getElementById('load-more-container');
  if (posts.length === 20) {
    lm.innerHTML = `<button class="btn btn-ghost" style="width:100%;margin:16px 0" onclick="loadMore()">تحميل المزيد</button>`;
  } else { lm.innerHTML = ''; }

  isLoading = false;
}

function loadMore() {
  feedPage++;
  renderFeed(false);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.feed-tab').forEach((t, i) => {
    t.classList.toggle('active', ['discover','following','analysis'][i] === tab);
  });
  renderFeed();
}

function createPostCard(p, standalone = false) {
  const avatarHtml = p.avatar
    ? `<img src="${p.avatar}" alt="">`
    : `<span>${(p.display_name||'?')[0]}</span>`;

  const symbolsHtml = p.stock_symbols
    ? p.stock_symbols.split(',').filter(Boolean).map(s =>
        `<span class="post-symbol" onclick="navigate('stock','${s}')">${s}</span>`
      ).join(' ')
    : '';

  const contentHtml = p.content
    .replace(/\$[A-Za-z0-9\u0600-\u06FF]{1,10}/g, s => `<span class="post-symbol" onclick="navigate('stock','${s}')">${s}</span>`)
    .replace(/\n/g, '<br>');

  let analysisBadge = '';
  if (p.post_type === 'analysis' && p.direction) {
    const d = p.direction === 'bullish' ? { cls:'bullish', icon:'📈', label:'صاعد' }
              : p.direction === 'bearish' ? { cls:'bearish', icon:'📉', label:'هابط' }
              : { cls:'neutral', icon:'↔️', label:'محايد' };
    analysisBadge = `<div class="analysis-badge ${d.cls}">${d.icon} تحليل ${d.label}</div>`;
  }

  let targetsHtml = '';
  if (p.post_type === 'analysis' && (p.target_price || p.stop_loss)) {
    targetsHtml = `<div class="analysis-targets">
      ${p.target_price ? `<span class="target-tag">🎯 الهدف: <span style="color:var(--green)">${p.target_price}</span></span>` : ''}
      ${p.stop_loss ? `<span class="target-tag">🛑 وقف الخسارة: <span style="color:var(--red)">${p.stop_loss}</span></span>` : ''}
      ${p.timeframe ? `<span class="target-tag">⏱️ ${timeframeLabel(p.timeframe)}</span>` : ''}
    </div>`;
  }

  const isOwner = currentUser && currentUser.id === p.user_id;
  const upActive = p.my_vote === 'up' ? 'active' : '';
  const downActive = p.my_vote === 'down' ? 'active' : '';

  const cardClick = standalone ? '' : `onclick="handlePostClick(event,'${p.id}')"`;
  return `<div class="post-card" id="post-${p.id}" style="${standalone ? '' : 'cursor:pointer'}" ${cardClick}>
    <div class="post-header">
      <div class="avatar" onclick="event.stopPropagation();navigate('profile','${p.username}')">${avatarHtml}</div>
      <div class="post-meta">
        <div class="post-author">
          <span class="author-name" onclick="event.stopPropagation();navigate('profile','${p.username}')">${p.display_name}</span>
          ${p.is_verified ? '<span class="verified-badge" title="موثّق">✓</span>' : ''}
          <span class="level-badge">${p.level_name}</span>
          <span class="author-handle">@${p.username}</span>
        </div>
        <div class="post-time">${p.time_ago}</div>
      </div>
      ${isOwner ? `<div class="post-menu" onclick="event.stopPropagation();deletePost('${p.id}')">🗑️</div>` : ''}
    </div>
    ${analysisBadge}
    <div class="post-content" onclick="event.stopPropagation()">${contentHtml}</div>
    ${targetsHtml}
    ${p.image ? `<img src="${p.image}" class="post-image" onclick="event.stopPropagation();openImage('${p.image}')" alt="تحليل">` : ''}
    <div class="post-actions" onclick="event.stopPropagation()">
      <button class="action-btn upvote ${upActive}" id="up-${p.id}" onclick="event.stopPropagation();vote('${p.id}','up')">
        👍 <span id="upvotes-${p.id}">${p.upvotes}</span>
      </button>
      <button class="action-btn downvote ${downActive}" id="down-${p.id}" onclick="event.stopPropagation();vote('${p.id}','down')">
        👎 <span id="downvotes-${p.id}">${p.downvotes}</span>
      </button>
      <button class="action-btn comment-btn" onclick="event.stopPropagation();toggleComments('${p.id}')">
        💬 <span id="comments-count-${p.id}">${p.comments_count}</span>
      </button>
      <button class="action-btn" onclick="event.stopPropagation();sharePost('${p.id}')">🔗</button>
    </div>
    <div class="comments-section" id="comments-${p.id}">
      ${currentUser ? `<div class="comment-input-row">
        <div class="avatar avatar-sm">${currentUser.avatar ? `<img src="${currentUser.avatar}">` : currentUser.display_name[0]}</div>
        <input class="comment-input" id="comment-input-${p.id}" placeholder="أضف تعليقاً..." onkeydown="if(event.key==='Enter')submitComment('${p.id}')">
        <button class="btn btn-primary btn-sm" onclick="submitComment('${p.id}')">إرسال</button>
      </div>` : ''}
      <div id="comments-list-${p.id}"></div>
    </div>
  </div>`;
}

function timeframeLabel(tf) {
  return { day:'يومي', week:'أسبوعي', month:'شهري', quarter:'ربع سنوي' }[tf] || tf;
}

async function vote(postId, type) {
  if (!currentUser) { showLoginModal(); return; }
  const res = await fetch('/api/vote', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ target_id:postId, target_type:'post', vote_type:type }) });
  const data = await res.json();
  if (data.error) { toast(data.error, 'error'); return; }
  document.getElementById(`upvotes-${postId}`).textContent = data.upvotes ?? document.getElementById(`upvotes-${postId}`).textContent;
  document.getElementById(`downvotes-${postId}`).textContent = data.downvotes ?? document.getElementById(`downvotes-${postId}`).textContent;
  const upBtn = document.getElementById(`up-${postId}`);
  const downBtn = document.getElementById(`down-${postId}`);
  if (data.action === 'removed') { upBtn.classList.remove('active'); downBtn.classList.remove('active'); }
  else if (type === 'up') { upBtn.classList.add('active'); downBtn.classList.remove('active'); }
  else { downBtn.classList.add('active'); upBtn.classList.remove('active'); }
}

const commentsCache = {};

async function toggleComments(postId) {
  const section = document.getElementById(`comments-${postId}`);
  section.classList.toggle('show');
  if (section.classList.contains('show')) {
    if (!commentsCache[postId]) {
      loadComments(postId);
    } else {
      const list = document.getElementById(`comments-list-${postId}`);
      if (list && !list.innerHTML.trim()) loadComments(postId);
    }
  }
}

async function loadComments(postId) {
  const res = await fetch(`/api/posts/${postId}/comments`);
  const data = await res.json();
  const list = document.getElementById(`comments-list-${postId}`);
  if (data.comments.length === 0) {
    list.innerHTML = '<p style="color:var(--text3);font-size:13px;padding:8px 0">لا توجد تعليقات — كن أول من يعلّق!</p>';
    return;
  }
  const all = data.comments;
  const show = all.slice(0, 3);
  const rest = all.length - 3;

  function renderReply(r, postId, parentId) {
    return `<div class="comment-item" id="cmt-${r.id}" style="margin-bottom:8px">
      <div class="avatar avatar-sm" onclick="navigate('profile','${r.username}')" style="cursor:pointer">
        ${r.avatar ? `<img src="${r.avatar}">` : r.display_name[0]}
      </div>
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-author" onclick="navigate('profile','${r.username}')">${r.display_name}</span>
          ${r.is_verified ? '<span style="color:var(--primary);font-size:12px">✓</span>' : ''}
          <span class="level-badge" style="font-size:10px">${r.level_name}</span>
          <span class="comment-time">${r.time_ago}</span>
        </div>
        <div class="comment-text">${r.content.replace(/\n/g,'<br>')}</div>
        <div class="comment-actions">
          <button class="comment-action-btn" onclick="likeComment('${r.id}', this)">
            👍 <span class="cmt-likes-${r.id}">${r.upvotes||0}</span>
          </button>
          <button class="comment-action-btn reply-btn" onclick="toggleReplyBox('reply2-${r.id}', '${r.display_name}')">
            💬 رد
          </button>
        </div>
        <div class="reply-box" id="reply-box-reply2-${r.id}">
          <div class="avatar avatar-sm" style="flex-shrink:0">
            ${currentUser ? (currentUser.avatar ? `<img src="${currentUser.avatar}">` : currentUser.display_name[0]) : '?'}
          </div>
          <input class="reply-input" id="reply-input-reply2-${r.id}" placeholder="ردّ على ${r.display_name}..."
            onkeydown="if(event.key==='Enter')submitReply('${postId}','${parentId}','reply2-${r.id}')">
          <button class="btn btn-primary btn-sm" onclick="submitReply('${postId}','${parentId}','reply2-${r.id}')">إرسال</button>
        </div>
      </div>
    </div>`;
  }

  function renderCmt(c) {
    const repliesHtml = (c.replies||[]).map(r => renderReply(r, postId, c.id)).join('');
    return `<div class="comment-item" id="cmt-${c.id}">
      <div class="avatar avatar-sm" onclick="navigate('profile','${c.username}')" style="cursor:pointer">
        ${c.avatar ? `<img src="${c.avatar}">` : c.display_name[0]}
      </div>
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-author" onclick="navigate('profile','${c.username}')">${c.display_name}</span>
          ${c.is_verified ? '<span style="color:var(--primary);font-size:12px">✓</span>' : ''}
          <span class="level-badge" style="font-size:10px">${c.level_name}</span>
          <span class="comment-time">${c.time_ago}</span>
        </div>
        <div class="comment-text">${c.content.replace(/\n/g,'<br>')}</div>
        <div class="comment-actions">
          <button class="comment-action-btn" onclick="likeComment('${c.id}', this)">
            👍 <span class="cmt-likes-${c.id}">${c.upvotes||0}</span>
          </button>
          <button class="comment-action-btn reply-btn" onclick="toggleReplyBox('${c.id}', '${c.display_name}')">
            💬 رد
          </button>
        </div>
        <div class="reply-box" id="reply-box-${c.id}">
          <div class="avatar avatar-sm" style="flex-shrink:0">
            ${currentUser ? (currentUser.avatar ? `<img src="${currentUser.avatar}">` : currentUser.display_name[0]) : '?'}
          </div>
          <input class="reply-input" id="reply-input-${c.id}" placeholder="ردّ على ${c.display_name}..."
            onkeydown="if(event.key==='Enter')submitReply('${postId}','${c.id}','${c.id}')">
          <button class="btn btn-primary btn-sm" onclick="submitReply('${postId}','${c.id}','${c.id}')">إرسال</button>
        </div>
        ${repliesHtml ? `<div class="replies-list" id="replies-${c.id}">${repliesHtml}</div>` : `<div class="replies-list" id="replies-${c.id}"></div>`}
      </div>
    </div>`;
  }

  list.innerHTML = show.map(renderCmt).join('') +
    (rest > 0 ? `<div style="padding:8px 0">
      <button class="btn btn-ghost btn-sm" onclick="navigate('post_id','${postId}');openPost('${postId}')">

}

function openPost(postId) {
  // نفتح صفحة المنشور الكاملة
  navigate('post', postId);
}

async function submitComment(postId) {
  if (!currentUser) { showLoginModal(); return; }
  const input = document.getElementById(`comment-input-${postId}`);
  const content = input.value.trim();
  if (!content) return;
  input.value = '';

  const res = await fetch(`/api/posts/${postId}/comments`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({content}) });
  const data = await res.json();
  if (data.error) { toast(data.error, 'error'); return; }

  const count = document.getElementById(`comments-count-${postId}`);
  if (count) count.textContent = parseInt(count.textContent) + 1;
  loadComments(postId);
}

// ── تفاعل التعليقات ──────────────────────────────────────────────
async function likeComment(commentId, btn) {
  if (!currentUser) { showLoginModal(); return; }
  const res = await fetch('/api/vote', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ target_id: commentId, target_type: 'comment', vote_type: 'up' })
  });
  const data = await res.json();
  if (data.error) return;
  const span = document.querySelector(`.cmt-likes-${commentId}`);
  if (span) {
    const current = parseInt(span.textContent) || 0;
    if (data.action === 'removed') { span.textContent = current - 1; btn.classList.remove('liked'); }
    else { span.textContent = current + 1; btn.classList.add('liked'); }
  }
}

function toggleReplyBox(commentId, name) {
  if (!currentUser) { showLoginModal(); return; }
  const box = document.getElementById(`reply-box-${commentId}`);
  box.classList.toggle('show');
  if (box.classList.contains('show')) {
    document.getElementById(`reply-input-${commentId}`)?.focus();
  }
}

async function submitReply(postId, parentId, inputKey) {
  if (!currentUser) { showLoginModal(); return; }
  const inputId = `reply-input-${inputKey}`;
  const input = document.getElementById(inputId);
  if (!input) { toast('خطأ في إيجاد حقل الرد', 'error'); return; }
  const content = input.value.trim();
  if (!content) return;
  input.value = '';

  const res = await fetch(`/api/posts/${postId}/comments`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ content, parent_id: parentId })
  });
  const data = await res.json();
  if (data.error) { toast(data.error, 'error'); return; }

  // أضف الرد في القائمة تحت التعليق الأصلي
  const repliesList = document.getElementById(`replies-${parentId}`);
  if (repliesList) {
    repliesList.insertAdjacentHTML('beforeend', `
      <div class="comment-item" style="margin-bottom:8px">
        <div class="avatar avatar-sm">
          ${currentUser.avatar ? `<img src="${currentUser.avatar}">` : currentUser.display_name[0]}
        </div>
        <div class="comment-body">
          <div class="comment-meta">
            <span class="comment-author">${currentUser.display_name}</span>
            <span class="comment-time">الآن</span>
          </div>
          <div class="comment-text">${content}</div>
          <div class="comment-actions">
            <button class="comment-action-btn" onclick="likeComment('${data.comment.id}', this)">
              👍 <span class="cmt-likes-${data.comment.id}">0</span>
            </button>
          </div>
        </div>
      </div>`);
  }

  document.getElementById(`reply-box-${inputKey}`)?.classList.remove('show');
  toast('تم إرسال ردك ✅', 'success');
  const count = document.getElementById(`comments-count-${postId}`);
  if (count) count.textContent = parseInt(count.textContent) + 1;
}

function handlePostClick(event, postId) {
  if (event.target.closest('button, a, input, textarea, .comments-section, .post-symbol, .avatar, .post-menu, .post-actions')) return;
  navigate('post', postId);
}

async function deletePost(postId) {
  if (!confirm('هل أنت متأكد من حذف المنشور؟')) return;
  const res = await fetch(`/api/posts/${postId}`, { method:'DELETE' });
  const data = await res.json();
  if (data.success) {
    document.getElementById(`post-${postId}`)?.remove();
    toast('تم حذف المنشور', 'info');
  }
}

function sharePost(postId) {
  const url = `${window.location.origin}/post/${postId}`;
  navigator.clipboard?.writeText(url).then(() => toast('تم نسخ الرابط 📋', 'success'));
}

function openImage(src) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;';
  overlay.innerHTML = `<img src="${src}" style="max-width:90vw;max-height:90vh;border-radius:12px">`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
}

async function loadProfile(username) {

  const u = data.user;
  const isMe = currentUser && currentUser.id === u.id;
  const isFollowing = data.is_following;

  el.innerHTML = `
    <div class="profile-header">
      <div class="profile-cover"></div>
      <div class="profile-avatar-wrap">
        <div class="avatar profile-avatar">${u.avatar ? `<img src="${u.avatar}">` : u.display_name[0]}</div>
        ${isMe
          ? `<button class="btn btn-ghost btn-sm" onclick="showEditProfile()">✏️ تعديل الملف</button>`
          : currentUser
            ? `<button class="btn ${isFollowing ? 'btn-ghost' : 'btn-primary'} btn-sm" id="follow-btn-${u.id}" onclick="toggleFollow('${u.id}','${u.username}')">
                ${isFollowing ? '✓ متابَع' : '+ متابعة'}

        }
      </div>
      <div class="profile-name">${u.display_name} ${u.is_verified ? '<span class="verified-badge">✓</span>' : ''}</div>
      <div class="profile-handle">@${u.username} · <span style="color:var(--primary)">${u.level_name}</span></div>
      ${u.bio ? `<div class="profile-bio">${u.bio}</div>` : ''}
      <div class="profile-stats">
        <div class="stat-item"><div class="stat-num">${u.posts_count}</div><div class="stat-label">منشور</div></div>
        <div class="stat-item"><div class="stat-num">${u.followers_count}</div><div class="stat-label">متابع</div></div>
        <div class="stat-item"><div class="stat-num">${u.following_count}</div><div class="stat-label">يتابع</div></div>

    up.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">لا توجد منشورات بعد</div></div>`;
  } else {
    postsData.posts.forEach(p => up.insertAdjacentHTML('beforeend', createPostCard(p)));
  }

async function toggleFollow(userId, username) {
  if (!currentUser) { showLoginModal(); return; }
  const res = await fetch(`/api/follow/${userId}`, { method:'POST' });
  const data = await res.json();
  if (data.error) { toast(data.error, 'error'); return; }
  const btn = document.getElementById(`follow-btn-${userId}`);
  if (btn) {
    btn.textContent = data.following ? '✓ متابَع' : '+ متابعة';
    btn.className = `btn ${data.following ? 'btn-ghost' : 'btn-primary'} btn-sm`;
  }
  toast(data.following ? `أنت الآن تتابع @${username}` : `توقفت عن متابعة @${username}`, 'info');
}

function showEditProfile() {
  if (!currentUser) return;
  document.getElementById('auth-modal-content').innerHTML = `

async function submitEditProfile(e) {
  e.preventDefault();
  const form = e.target;
  const formData = new FormData(form);
  const res = await fetch('/api/profile', { method:'POST', body:formData });
  const data = await res.json();
  if (data.error) { document.getElementById('edit-error').textContent = data.error; return; }
  toast('تم تحديث الملف الشخصي ✅', 'success');
  closeModal('auth-modal');
  await checkAuth();
  loadProfile(currentUser.username);
}

  const stockInfo = [
    {symbol:'$2222',name:'أرامكو'},{symbol:'$1120',name:'الراجحي'},{symbol:'$1010',name:'الرياض'},

        </div>

          <div class="sentiment-label"><span style="color:var(--red)">📉 هابط</span><span>${bearishPct}%</span></div>

      <div id="post-page-comments"></div>

  try {

async function loadPostPageComments(postId) {

      list.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text3)">
        <div style="font-size:32px;margin-bottom:8px">💬</div>

      return;
    }
    list.innerHTML = cmts.map(c => `
      <div class="single-comment-item" id="cmt-${c.id}">
        <div class="avatar avatar-sm" onclick="navigate('profile','${c.username}')" style="cursor:pointer">
          ${c.avatar ? `<img src="${c.avatar}">` : c.display_name[0]}
        </div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">
            <span style="font-weight:600;font-size:13px;cursor:pointer" onclick="navigate('profile','${c.username}')">${c.display_name}</span>
            ${c.is_verified ? '<span style="color:var(--primary);font-size:12px">✓</span>' : ''}
            <span class="level-badge" style="font-size:10px">${c.level_name}</span>
            <span style="font-size:11px;color:var(--text3)">${c.time_ago}</span>
          </div>
          <div style="font-size:14px;color:var(--text)">${c.content.replace(/\n/g,'<br>')}</div>
          <div class="comment-actions">
            <button class="comment-action-btn" onclick="likeComment('${c.id}', this)">
              👍 <span class="cmt-likes-${c.id}">${c.upvotes||0}</span>
            </button>
            <button class="comment-action-btn reply-btn" onclick="toggleReplyBox('${c.id}', '${c.display_name}')">
              💬 رد
            </button>
          </div>
          <div class="reply-box" id="reply-box-${c.id}">
            <div class="avatar avatar-sm" style="flex-shrink:0">
              ${currentUser ? (currentUser.avatar ? `<img src="${currentUser.avatar}">` : currentUser.display_name[0]) : '?'}
            </div>
            <input class="reply-input" id="reply-input-${c.id}" placeholder="ردّ على ${c.display_name}..."
              onkeydown="if(event.key==='Enter')submitReply('${postId}','${c.id}','${c.id}')">
            <button class="btn btn-primary btn-sm" onclick="submitReply('${postId}','${c.id}','${c.id}')">إرسال</button>
          </div>
          <div class="replies-list" id="replies-${c.id}"></div>
        </div>
      </div>`).join('');
  } catch(e) {}
}

async function submitPostPageComment(postId) {
  if (!currentUser) { showLoginModal(); return; }
  const input = document.getElementById('post-page-cmt-input');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  const r = await fetch(`/api/posts/${postId}/comments`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({content})
  });
  const d = await r.json();
  if (d.error) { toast(d.error, 'error'); return; }
  toast('تم إضافة تعليقك ✅', 'success');
  loadPostPageComments(postId);
}

let latestPostId = null;

  if (currentPage !== 'home') { setTimeout(checkNewPosts, 15000); return; }
  try {
    const r = await fetch('/api/posts?page=0&limit=1');
    const d = await r.json();
    if (d.posts && d.posts.length > 0) {

      if (latestPostId && newestId !== latestPostId) {
        newPostsCount++;
        const btn = document.getElementById('new-posts-btn');
        btn.classList.add('show');
        btn.querySelector('button').textContent = `⬆️ ${newPostsCount > 1 ? newPostsCount + ' منشورات جديدة' : 'منشور جديد'} — اضغط للتحديث`;
      }
      if (!latestPostId) latestPostId = newestId;
    }
  } catch(e) {}
  setTimeout(checkNewPosts, 15000);
}

  if (!el) return;
  el.innerHTML = news.map(n => `
    <div class="news-item" onclick="goToNews('${n.post_id||''}')">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span class="news-source">📌 ${n.source||'جلسة السوق'}</span>
        ${n.stock_symbols ? `<span class="news-sym">${n.stock_symbols.split(' ')[0]}</span>` : ''}
      </div>
      <div class="news-title">${n.title}</div>
      <div class="news-meta">
        <span>${formatNewsTime(n.published_at)}</span>
        ${n.comments_count > 0 ? `<span>💬 ${n.comments_count} تعليق</span>` : ''}
      </div>
    </div>`).join('');
}

function formatNewsTime(dt) {
  if (!dt) return '';
  const diff = Math.floor((Date.now() - new Date(dt)) / 1000);
  if (diff < 3600) return 'منذ ' + Math.floor(diff/60) + ' دقيقة';
  if (diff < 86400) return 'منذ ' + Math.floor(diff/3600) + ' ساعة';
  return 'منذ ' + Math.floor(diff/86400) + ' يوم';
}

    html += `<div style="padding:8px 16px;font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.5px">المنشورات</div>`;

  el.innerHTML = html;

}
